<!DOCTYPE html>
<html>
<head>
    <title>Recommendations</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Recommended for You</h1>

{% if suggestions %}
    <ul>
        {% for item in suggestions %}
            <li>{{ item }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p>No recommendations yet. Add items to your cart first.</p>
{% endif %}

<br>

<a href="/">Back to Home</a>

</body>
</html>
