{% extends "base.html" %}
{% set title = "Home" %}

{% block content %}
<section class="hero">
    <div class="box hero-box">
        <div class="logo-spot">
            <img src="https://placehold.co/160x160/ffffff/cd5c5c?text=Logo" alt="Logo placeholder">
        </div>

        <h1>Beautiful Finds for Everyday Shopping</h1>
        <p>Shop simple, pretty products with a clean cart and easy recommendations.</p>

        <div class="button-row">
            <a class="button" href="{{ url_for('products') }}">Shop Products</a>
            <a class="button button-light" href="{{ url_for('recommendations') }}">Recommendations</a>
            <a class="button button-light" href="{{ url_for('login') }}">Login</a>
        </div>
    </div>

    <img class="hero-image" src="{{ url_for('static', filename='images/openshop.png') }}" alt="A bright ecommerce shop display">
</section>
{% endblock %}
